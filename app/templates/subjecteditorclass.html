<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Design by foolishdeveloper.com -->
    <title>Classroom Finder - Editor Login</title>
 
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
    <!--Stylesheet-->
    <style media="screen">
      *,
*:before,
*:after{
    padding: 0;
    margin: 0;
    box-sizing: border-box;
}
body{
    background-color: #1b1b1b;
}
form{
    height: 800px;
    width: 400px;
    background-color: rgba(255,255,255,0.13);
    position: absolute;
    transform: translate(-50%,-50%);
    top: 50%;
    left: 50%;
    border-radius: 10px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 40px rgba(8,7,16,0.6);
    padding: 30px;
}
form *{
    font-family: 'Poppins',sans-serif;
    letter-spacing: 0.5px;
    outline: none;
    border: none;
}
form h3{
    color: #ffffff;
    font-size: 32px;
    font-weight: 500;
    line-height: 35px;
    text-align: center;
}

label{
    color: #ffffff;
    display: block;
    margin-top: 20px;
    font-size: 16px;
    font-weight: 500;
}
input, select{
    display: block;
    height: 50px;
    width: 100%;
    background-color: rgba(255,255,255,0.07);
    border-radius: 3px;
    padding: 0 10px;
    margin-top: 8px;
    font-size: 14px;
    font-weight: 300;
}
::placeholder{
    color: #e5e5e5;
}
input[type='submit']{
    margin-top: 30px;
    width: 100%;
    background-color: #ffffff;
    color: #080710;
    padding: 15px 0;
    font-size: 18px;
    font-weight: 600;
    border-radius: 5px;
    cursor: pointer;
}

.links {
    width: 100%;
    text-align: center;
    align-items: center;
    justify-content: center;
    display: flex;
    margin-top: 30px;
}
.links a {
    text-decoration: none;
    padding: 15px 25px;
    margin: 5px;
    background-color: #fff;
    color: #000;
    border-radius: 5px;
    transition: 0.5s ease;
    min-width: 50%;
}
.links a:hover {
    background-color: #00FFFF;
}

    </style>
</head>
<body>
    <form method='get'>
        <h3>Select Class to Asign Staffs</h3>

        <label>Programme</label>
        {{ form.Programme }}

        <label>Course</label>
        <input class="form-select" placeholder="Select Course" name="Course" type="text" list="Courses">
        <datalist id="Courses">
            {% for i in form.Course %}
                <option>{{i}}</option>
            {% endfor %}
        </datalist>

        <label>Year</label>
        {{ form.Year }}

        <label>Section</label>
        {{ form.Section }}

        <label>Slot</label>
        <select name="Slot">
            <option value="A">A</option>
            <option value="B">B</option>
        </select>

        <input type="submit" value="Select">
        
        <div class="links">
            <a href="{% url 'staffeditor' %}" class="card">Staff Editor</a>
            <a href="{% url 'editor' %}" class="card">Class Editor</a>
        </div>
    </form>
</body>
</html>
