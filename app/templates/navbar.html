<!DOCTYPE html>
<html lang="en">
<head>
    <style media="screen">
      .navbar {
            overflow: hidden;
            background-color: #333;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 99;
            font-family: Arial, sans-serif;
            max-width: 100%; /* Set the maximum width according to your preference */
            margin: 0 auto; /* Center the navbar */
        }

        .navbar a {
            float: left;
            display: block;
            color: #f2f2f2;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
            transition: 300ms;
        }

        .navbar a:hover {
            background-color: #ddd;
            color: black;
        }

        .navbar a.active {
            background-color: #245dc7;
            color: white;
        }

        .navbar p {
            color: white !important;
            position: fixed !important;
            top: 50 !important;
            right: 0 !important;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="{% url 'editor' %}" {% if current_page == "editor" %}class="active"{% endif %}>Class Editor</a>
        <a href="{% url 'staffeditor' %}" {% if current_page == "staffeditor" %}class="active"{% endif %}>Staff Editor</a>
        <a href="{% url 'subjecteditor' %}" {% if current_page == "subjecteditor" %}class="active"{% endif %}>Subject Editor</a>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var currentPath = window.location.pathname;

            var navbarLinks = document.querySelectorAll('.navbar a');
            navbarLinks.forEach(function (link) {
                var linkPath = link.getAttribute('href');
                if (currentPath === linkPath) {
                    link.classList.add('active');
                }
            });
        });
    </script>
</body>
</html>
