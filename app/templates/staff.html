<!DOCTYPE html>
<html lang="en">
<head>
    <title>Classroom Finder - Staffs</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
    <style media="screen">
      *, *:before, *:after{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        body{
            background-color: #1b1b1b;
        }
        form{
            height: 650px;
            width: 720px;
            background-color: rgba(255,255,255,0.13);
            position: absolute;
            transform: translate(-50%,-50%);
            top: 50%;
            left: 50%;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(0, 0, 0, 0.1);
            box-shadow: 0 0 40px rgba(8,7,16,0.6);
            padding: 30px;
        }
        form *{
            font-family: 'Poppins',sans-serif;
            color: #ffffff;
            letter-spacing: 0.5px;
            outline: none;
            border: none;
        }
        form h3{
            font-size: 4rem;
            font-weight: 500;
            text-align: center;
            margin-bottom: 100px;
        }

        label{
            display: block;
            margin-top: 30px;
            font-size: 2rem;
            font-weight: 500;
        }
        input{
            display: block;
            height: 80px;
            width: 100%;
            background-color: rgba(255,255,255,0.07);
            border-radius: 3px;
            padding: 0 10px;
            margin-top: 8px;
            font-size: 2rem;
            font-weight: 300;
        }
        input[type='Submit'] {
            margin-top: 40px;
            width: 100%;
            background-color: #ffffff;
            color: #080710;
            padding: 15px 0;
            font-size: 2rem;
            font-weight: 600;
            border-radius: 5px;
            cursor: pointer;
        }
        
        @media only screen and (min-width: 769px) {
            form{
                height: 400px;
                width: 500px;
                background-color: rgba(255,255,255,0.13);
                position: absolute;
                transform: translate(-50%,-50%);
                top: 50%;
                left: 50%;
                border-radius: 10px;
                backdrop-filter: blur(10px);
                box-shadow: 0 0 40px rgba(8,7,16,0.6);
                padding: 30px;
            }
            form *{
                font-family: 'Poppins',sans-serif;
                letter-spacing: 0.5px;
                outline: none;
                border: none;
            }
            form h3{
                color: #ffffff;
                font-size: 42px;
                font-weight: 500;
                line-height: 35px;
                text-align: center;
            }
            label{
                display: block;
                margin-top: 25px;
                font-size: 24px;
                font-weight: 500;
                color: #fff;
            }
            input, select{
                display: block;
                height: 50px;
                width: 100%;
                background-color: rgba(255,255,255,0.07);
                border-radius: 3px;
                padding: 0 10px;
                margin-top: 8px;
                font-size: 14px;
                font-weight: 300;
            }
            input[type='submit']{
                margin-top: 50px;
                width: 100%;
                background-color: #ffffff;
                color: #080710;
                padding: 15px 0;
                font-size: 18px;
                font-weight: 600;
                border-radius: 5px;
                cursor: pointer;
            }
        }
    </style>
</head>
<body>
    {% include "header.html" %}
    <form>
        <h3>Class Finder - Staffs</h3>

        <label>Employee ID</label>
        <input type="text" name="EmpID">

        <input type="submit" value="Find">
        
    </form>
</body>
</html>
