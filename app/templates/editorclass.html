<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Design by foolishdeveloper.com -->
    <title>Classroom Finder - Editor Login</title>
 
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
    <!--Stylesheet-->
    <style media="screen">
      *,
*:before,
*:after{
    padding: 0;
    margin: 0;
    box-sizing: border-box;
}
body{
    background-color: #1b1b1b;
}
form{
    height: 700px;
    width: 400px;
    background-color: rgba(255,255,255,0.13);
    position: absolute;
    transform: translate(-50%,-50%);
    top: 50%;
    left: 50%;
    border-radius: 10px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 40px rgba(8,7,16,0.6);
    padding: 30px;
}
.dayorder {
    position: absolute;
    top: 25%;
    right: 20%;
}
.dayorder h1 {
    font-size: 1.7rem;
}
.dayorder form {
    height: 300px;
    width: 300px;
    background-color: rgba(255,255,255,0.13);
    border-radius: 10px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 40px rgba(8,7,16,0.6);
    padding: 30px;
}
.dayorder form input[type='submit']{
    margin-top: 30px;
    width: 100%;
    background-color: #ffffff;
    color: #080710;
    padding: 15px 0;
    font-size: 18px;
    font-weight: 600;
    border-radius: 5px;
    cursor: pointer;
}
form *{
    font-family: 'Poppins',sans-serif;
    color: #ffffff;
    letter-spacing: 0.5px;
    outline: none;
    border: none;
}
form h3{
    font-size: 32px;
    font-weight: 500;
    line-height: 35px;
    text-align: center;
}

label{
    display: block;
    margin-top: 25px;
    font-size: 16px;
    font-weight: 500;
}
input, select{
    display: block;
    height: 50px;
    width: 100%;
    background-color: rgba(255,255,255,0.07);
    border-radius: 3px;
    padding: 0 10px;
    margin-top: 8px;
    font-size: 14px;
    font-weight: 300;
}
::placeholder{
    color: #e5e5e5;
}
input[type='submit']{
    margin-top: 50px;
    width: 100%;
    background-color: #ffffff;
    color: #080710;
    padding: 15px 0;
    font-size: 18px;
    font-weight: 600;
    border-radius: 5px;
    cursor: pointer;
}

.links {
    width: 100%;
    text-align: center;
    align-items: center;
    justify-content: center;
    display: flex;
    margin-top: 30px;
}
.links a {
    text-decoration: none;
    padding: 15px 25px;
    margin: 5px;
    background-color: #fff;
    color: #000;
    border-radius: 5px;
    transition: 0.5s ease;
    min-width: 48%;
    font-size: 0.9rem;
}
.links a:hover {
    background-color: #00FFFF;
}

    </style>
</head>
<body>
    <form method='get'>
        <h3>Select Class</h3>

        <label>Programme</label>
        {{ form.Programme }}

        <label>Course</label>
        {{ form.Course }}

        <label>Year</label>
        {{ form.Year }}

        <label>Section</label>
        {{ form.Section }}

        <input type="hidden" name="Order" value="1">

        <input type="submit" value="Select">
        
        <div class="links">
            <a href="{% url 'staffeditor' %}" class="card">Staff Editor</a>
            <a href="{% url 'subjecteditor' %}" class="card">Subject Editor</a>
        </div>
    </form>
    <div class="dayorder">
        <form action="{% url 'changedayorder' %}" method="post">
            {% csrf_token %}
            <h1>Today's Day Order <select name="Order">
                <option value="1" {% if current_dayorder == 1 %}selected{% endif %}>1</option>
                <option value="2" {% if current_dayorder == 2 %}selected{% endif %}>2</option>
                <option value="3" {% if current_dayorder == 3 %}selected{% endif %}>3</option>
                <option value="4" {% if current_dayorder == 4 %}selected{% endif %}>4</option>
                <option value="5" {% if current_dayorder == 5 %}selected{% endif %}>5</option>
            </select></h1>
            <input type="submit" value="Change">
        </form>
    </div>
</body>
</html>
